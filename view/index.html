    <script>
      (function () {
        const box = document.createElement('div');
        box.id = 'debugOverlay';
        box.style.cssText =
          'position:fixed;right:8px;bottom:8px;max-width:50vw;max-height:40vh;overflow:auto;z-index:99999;background:#111;color:#0f0;font:12px/1.4 monospace;padding:10px;border-radius:8px;box-shadow:0 2px 10px rgba(0,0,0,.5)';
        box.innerHTML = '<b>DEBUG</b><br>';
        document.body.appendChild(box);
    
        function log(msg) {
          const p = document.createElement('div');
          p.textContent = msg;
          box.appendChild(p);
        }
    
        // log các lần render + hash hiện tại
        const _renderPage = window.renderPage;
        if (typeof _renderPage === 'function') {
          window.renderPage = async function() {
            log('[render] ' + (window.location.hash || '#/'));
            try { return await _renderPage.apply(this, arguments); }
            catch (e) { log('render exception: ' + e.message); throw e; }
          };
        }
    
        window.addEventListener('hashchange', () => {
          log('[hashchange] ' + (window.location.hash || '#/'));
        });
    
        window.onerror = function (msg, src, line, col, err) {
          log('JS Error: ' + msg + ' @' + (src||'') + ':' + (line||'?'));
          if (err && err.stack) log(err.stack.split('\n')[0]);
        };
    
        window.onunhandledrejection = function (ev) {
          const e = ev.reason || {};
          log('Promise Rejection: ' + (e.message || String(e)));
        };
      })();
    </script>
  </body>
