<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Phòng Khám Trực Tuyến - Đặt lịch khám</title>

    <!-- 🎨 Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- ⚙️ Tailwind theme -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#0096C7",
              secondary: "#00B894",
              info: "#0096C7",
              warning: "#F9A826",
              danger: "#E63946",
              surface: "#FFFFFF",
              textmain: "#1E293B",
              border: "#E2E8F0",
              textmuted: "#475569",
              bgpage: "#F1F5F9",
            },
            fontFamily: { sans: ["Inter", "system-ui", "sans-serif"] },
            boxShadow: { card: "0 2px 8px rgba(0,0,0,.05)" },
          },
        },
      };
    </script>

    <!-- 🧩 Font Awesome -->
    <link href="./assets/font-awesome-6.6.0-pro-full-main/css/all.css" rel="stylesheet" />

    <!-- 📅 FullCalendar CSS -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.14/index.global.min.css" rel="stylesheet" />

    <!-- 🌈 AOS -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet" />

    <!-- Embla Carousel CSS (nếu cần dùng) -->
    <link rel="stylesheet" href="https://unpkg.com/embla-carousel/embla.css" />

    <style>
      .parallax-bg { background-attachment: fixed; background-size: cover; background-position: center; }
    </style>
  </head>

  <body class="bg-bgpage text-textmain font-sans">
    <div id="app" class="min-h-screen flex flex-col">
      <!-- Header -->
      <header id="header" class="bg-surface shadow-sm"></header>

      <!-- Nội dung -->
      <main id="view-root" aria-live="polite" class="container mx-auto px-6 py-10 grow"></main>

      <!-- Footer -->
      <footer id="footer" class="bg-surface border-t border-border py-6 mt-8"></footer>
    </div>

    <!-- ===== Vendor JS (defer) ===== -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.14/index.global.min.js" defer></script>
    <script src="https://unpkg.com/embla-carousel/embla.umd.js" defer></script>
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js" defer></script>

   <!-- App Config & Core -->
   <script src="./assets/js/config.js" defer></script>
   <script src="./assets/js/logout.js" defer></script>
   <script src="./assets/js/auth.js" defer></script>
   
   <!-- Page scripts -->
   <script src="./assets/js/pages/login.js" defer></script>
   <script src="./assets/js/pages/register.js" defer></script>
   <script src="./assets/js/pages/booking.js" defer></script>
   <script src="./assets/js/pages/confirm.js" defer></script>
   
   <!-- Router -->
   <script src="./assets/js/app.js" defer></script>
   

    <!-- AOS init + refresh cho SPA -->
    <script defer>
      document.addEventListener("DOMContentLoaded", () => {
        if (window.AOS) {
          AOS.init({ duration: 800, once: true, easing: "ease-out" });
        }
      });
      window.addEventListener("hashchange", () => {
        setTimeout(() => window.AOS && AOS.refresh(), 400);
      });
    </script>
  </body>
</html>
