<section class="container mx-auto px-4 md:px-6 lg:px-8 mt-8 max-w-7xl">
  <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
    <!-- Ảnh minh hoạ -->
    <div class="lg:col-span-6">
      <div class="relative bg-white rounded-2xl border border-gray-200 shadow-lg overflow-hidden">
        <img 
             alt="Phòng khám"
             class="w-full h-[220px] sm:h-[300px] lg:h-[520px] object-cover"
             onerror="this.onerror=null;this.src='https://picsum.photos/1200/800?random=21';" />
        <div class="absolute left-3 top-3 px-3 py-1 rounded-full bg-black/40 text-white text-xs">
          🩺 Phòng khám
        </div>
      </div>
    </div>

    <!-- Form đặt lịch -->
    <div class="lg:col-span-6">
      <div class="bg-white rounded-2xl border border-gray-200 shadow-lg overflow-hidden">
        <div class="p-5 md:p-6">
          <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
            <span class="inline-block w-2 h-2 rounded-full bg-sky-500"></span>
            Đặt lịch khám
          </h2>

          <form id="bookingForm" class="space-y-4 text-sm" novalidate>

            <!-- Bác sĩ -->
            <div>
              <label for="doctorSelect" class="block font-semibold mb-1">Chọn bác sĩ</label>
              <select id="doctorSelect"
                      class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-sky-500 focus:outline-none"
                      required>
                <option value="" selected disabled>-- Chọn bác sĩ --</option>
                <!-- booking.js sẽ tự động load danh sách -->
              </select>
            </div>

            <!-- Ngày & Giờ -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <div>
                <label for="date" class="block font-semibold mb-1">Ngày khám</label>
                <input id="date" type="date" 
                       class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-sky-500 focus:outline-none"
                       required />
              </div>
              <div>
                <label for="timeSelect" class="block font-semibold mb-1">Giờ khám trống</label>
                <select id="timeSelect"
                        class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-sky-500 focus:outline-none"
                        required>
                  <option value="" selected disabled>— Chọn bác sĩ & ngày trước —</option>
                </select>
              </div>
            </div>

            <!-- Ghi chú -->
            <div>
              <label for="note" class="block font-semibold mb-1">Ghi chú (tuỳ chọn)</label>
              <textarea id="note" rows="2"
                        class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-sky-500 focus:outline-none"
                        placeholder="Ví dụ: Tôi bị ho 2 ngày nay..."></textarea>
              <p class="text-gray-500 mt-1 text-xs">
                * Bạn có thể mô tả ngắn triệu chứng để bác sĩ chuẩn bị tốt hơn.
              </p>
            </div>

            <!-- Nút gửi -->
            <button type="submit"
                    class="w-full bg-sky-500 text-white font-semibold py-2.5 rounded-lg hover:bg-sky-600 transition">
              ✅ Xác nhận đặt lịch
            </button>

            <!-- Khu vực hiển thị trạng thái -->
            <p id="statusMsg" class="text-center text-gray-500 text-sm mt-2"></p>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
