<div class="max-w-md mx-auto mt-10 bg-white rounded-xl shadow-card p-6">
  <h2 class="text-xl font-semibold mb-1 text-center">📝 Đăng ký tài khoản</h2>
  <p class="text-center text-sm text-textmuted mb-4">
    Tạo tài khoản bệnh nhân để đặt lịch khám nhanh chóng.
  </p>

  <form id="registerForm" class="space-y-4" novalidate>
    <!-- Họ và tên -->
    <div>
      <label for="fullname" class="block text-sm font-medium mb-1">Họ và tên</label>
      <input
        type="text"
        id="fullname"
        name="fullname"
        class="w-full border border-border rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary"
        placeholder="Nguyễn Văn A"
        autocomplete="name"
        required
      />
      <p id="fullnameHelp" class="mt-1 text-xs text-textmuted">Nhập họ tên đầy đủ của bạn.</p>
    </div>

    <!-- Email -->
    <div>
      <label for="email" class="block text-sm font-medium mb-1">Email</label>
      <input
        type="email"
        id="email"
        name="email"
        class="w-full border border-border rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary"
        placeholder="example@gmail.com"
        autocomplete="email"
        required
      />
      <p id="emailHelp" class="mt-1 text-xs text-textmuted">Email sẽ dùng để đăng nhập và nhận thông báo lịch hẹn.</p>
    </div>

    <!-- Mật khẩu -->
    <div>
      <label for="password" class="block text-sm font-medium mb-1">Mật khẩu</label>
      <div class="relative">
        <input
          type="password"
          id="password"
          name="password"
          class="w-full border border-border rounded-md p-2 pr-10 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary"
          placeholder="••••••••"
          autocomplete="new-password"
          minlength="6"
          required
        />
        <!-- Toggle hiển thị mật khẩu -->
        <button type="button" id="togglePwd" class="absolute inset-y-0 right-0 px-3 text-gray-500 hover:text-gray-700" aria-label="Hiển thị mật khẩu">
          <i class="fa-regular fa-eye" id="pwdIcon"></i>
        </button>
      </div>
      <p class="mt-1 text-xs text-textmuted">Tối thiểu 6 ký tự.</p>
    </div>

    <!-- Nút submit -->
    <button
      type="submit"
      id="btnSubmit"
      class="w-full bg-primary text-white py-2 rounded-md hover:opacity-90 transition disabled:opacity-60 disabled:cursor-not-allowed"
    >
      Đăng ký
    </button>

    <p class="text-center text-sm mt-2 text-gray-500">
      Đã có tài khoản?
      <a href="#/login" class="text-blue-600 hover:underline">Đăng nhập</a>
    </p>
  </form>

  <div id="registerStatus" class="text-center text-sm text-gray-600 mt-4"></div>
</div>
